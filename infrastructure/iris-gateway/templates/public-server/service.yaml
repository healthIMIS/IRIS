apiVersion: v1
kind: Service
metadata:
  name: {{ include "iris-gateway.public" . }}
  labels:
    {{- include "iris-gateway.public-labels" . | nindent 4 }}
spec:
  type: NodePort
  ports:
    - port: {{ .Values.public.port }}
      targetPort: https
      protocol: TCP
      name: http
  selector:
    {{- include "iris-gateway.public-labels" . | nindent 4 }}
